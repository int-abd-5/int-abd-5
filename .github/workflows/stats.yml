name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create stats folder
        run: mkdir -p generated

      - name: Download stats card
        run: |
          curl -L "https://github-readme-stats.vercel.app/api?username=int-abd-5&show_icons=true&theme=tokyonight&hide_border=true" -o generated/github-stats.svg

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=int-abd-5&layout=compact&theme=tokyonight&hide_border=true" -o generated/top-langs.svg

      - name: Commit generated files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add generated/
          git diff --cached --quiet || git commit -m "update github stats cards"
          git push
